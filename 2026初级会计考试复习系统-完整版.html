<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026初级会计考试复习系统（完整详细版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', '微软雅黑', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .update-info {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            margin-top: 15px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 15px 30px;
            background: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .tab:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .tab-content.active {
            display: block;
        }

        /* 复习计划样式 */
        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .progress-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .calendar-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .day-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        .day-card:hover {
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
        }

        .day-card.completed {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border-color: #4caf50;
        }

        .day-card.rest-day {
            background: #f5f5f5;
            border-color: #9e9e9e;
        }

        .day-card.today {
            border: 3px solid #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.4);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .day-title {
            font-weight: bold;
            color: #333;
            font-size: 1.2em;
        }

        .day-status {
            font-size: 0.9em;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .day-status.pending {
            background: #fff3cd;
            color: #856404;
        }

        .day-status.completed {
            background: #d4edda;
            color: #155724;
        }

        .day-status.rest {
            background: #e2e3e5;
            color: #383d41;
        }

        .day-task {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .checkin-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .checkin-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .checkin-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* 知识卡片样式 */
        .subject-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .subject-btn {
            padding: 12px 25px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .subject-btn:hover, .subject-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .chapter-list {
            display: grid;
            gap: 20px;
        }

        .chapter-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .chapter-card:hover {
            border-color: #667eea;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.15);
        }

        .chapter-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chapter-title {
            font-size: 1.3em;
            font-weight: bold;
        }

        .chapter-toggle {
            font-size: 1.5em;
            transition: transform 0.3s ease;
        }

        .chapter-toggle.expanded {
            transform: rotate(180deg);
        }

        .knowledge-cards {
            display: none;
            padding: 20px;
            background: #f9f9f9;
        }

        .knowledge-cards.expanded {
            display: block;
        }

        .knowledge-card {
            background: white;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .knowledge-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .knowledge-icon {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .ability-tag {
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: bold;
            margin-left: 10px;
        }

        .ability-master {
            background: #ff6b6b;
            color: white;
        }

        .ability-familiar {
            background: #4ecdc4;
            color: white;
        }

        .ability-know {
            background: #95e1d3;
            color: #333;
        }

        .knowledge-content {
            line-height: 1.8;
            color: #444;
        }

        .knowledge-content p {
            margin-bottom: 12px;
        }

        .knowledge-content strong {
            color: #667eea;
            font-weight: bold;
        }

        .knowledge-content ul {
            margin-left: 20px;
            margin-bottom: 12px;
        }

        .knowledge-content li {
            margin-bottom: 5px;
        }

        /* 考试测试样式 */
        .exam-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .exam-btn {
            padding: 12px 25px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .exam-btn:hover, .exam-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .exam-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .exam-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .exam-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .exam-timer {
            font-size: 1.2em;
            font-weight: bold;
            color: #e74c3c;
        }

        .question-item {
            background: #f9f9f9;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .question-number {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.1em;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .question-options {
            display: grid;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-label:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option-label.selected {
            border-color: #667eea;
            background: #e8f0ff;
        }

        .option-label.correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        .option-label.wrong {
            border-color: #e74c3c;
            background: #ffebee;
        }

        .option-input {
            margin-right: 10px;
        }

        /* 章节测试样式 */
        .chapter-test-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
        }

        .chapter-test-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.4);
        }

        .chapter-test-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .chapter-test-modal.active {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .chapter-test-content {
            background: white;
            border-radius: 20px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .chapter-test-header {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            color: white;
            padding: 25px 30px;
            border-radius: 20px 20px 0 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .chapter-test-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .chapter-test-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chapter-test-progress {
            font-size: 1.1em;
        }

        .chapter-test-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5em;
            transition: all 0.3s ease;
        }

        .chapter-test-close:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        .chapter-test-body {
            padding: 30px;
        }

        .chapter-question-item {
            background: #f9f9f9;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            border-left: 4px solid #4ecdc4;
        }

        .chapter-question-number {
            font-weight: bold;
            color: #4ecdc4;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .chapter-question-text {
            font-size: 1.05em;
            margin-bottom: 15px;
            line-height: 1.6;
            color: #333;
        }

        .chapter-question-options {
            display: grid;
            gap: 10px;
        }

        .chapter-option-label {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .chapter-option-label:hover {
            border-color: #4ecdc4;
            background: #f0fffe;
        }

        .chapter-option-label.selected {
            border-color: #4ecdc4;
            background: #e0fff9;
        }

        .chapter-option-label.correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        .chapter-option-label.wrong {
            border-color: #e74c3c;
            background: #ffebee;
        }

        .chapter-test-footer {
            padding: 20px 30px;
            background: #f9f9f9;
            border-radius: 0 0 20px 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            position: sticky;
            bottom: 0;
        }

        .chapter-test-submit {
            padding: 12px 35px;
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .chapter-test-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.4);
        }

        .chapter-test-result {
            text-align: center;
            padding: 40px 20px;
        }

        .chapter-result-score {
            font-size: 4em;
            font-weight: bold;
            color: #4ecdc4;
            margin: 20px 0;
        }

        .chapter-result-message {
            font-size: 1.3em;
            margin-bottom: 20px;
        }

        .chapter-result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }

        .chapter-stat-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
        }

        .chapter-stat-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .chapter-stat-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .exam-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
        }

        .exam-btn-primary {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .exam-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .exam-btn-secondary {
            padding: 15px 40px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .exam-btn-secondary:hover {
            background: #f0f4ff;
        }

        /* 考试结果样式 */
        .exam-result {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }

        .result-score {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .result-status {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .result-status.pass {
            color: #4caf50;
        }

        .result-status.fail {
            color: #e74c3c;
        }

        .result-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .result-item {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
        }

        .result-item-title {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .result-item-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        /* 错题集样式 */
        .wrong-questions {
            display: grid;
            gap: 20px;
        }

        .wrong-question-card {
            background: white;
            border-left: 4px solid #e74c3c;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .wrong-question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .wrong-question-number {
            font-weight: bold;
            color: #e74c3c;
        }

        .wrong-question-source {
            font-size: 0.9em;
            color: #999;
        }

        .wrong-answer {
            background: #ffebee;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            border-left: 3px solid #e74c3c;
        }

        .correct-answer {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            border-left: 3px solid #4caf50;
        }

        .explanation {
            background: #fff3cd;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            border-left: 3px solid #ffc107;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .tabs {
                justify-content: center;
            }

            .tab {
                padding: 12px 20px;
                font-size: 1em;
            }

            .calendar-view {
                grid-template-columns: 1fr;
            }

            .exam-actions {
                flex-direction: column;
            }
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 2026初级会计考试复习系统</h1>
            <p class="subtitle">科学规划 · 系统复习 · 高效备考 · 最新大纲</p>
            <div class="update-info">
                📢 2026年最新大纲更新 | 新增：应收股利和应收利息 | 删除：耕地占用税
            </div>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="showTab('plan')">📅 复习计划</button>
            <button class="tab" onclick="showTab('knowledge')">📖 知识卡片</button>
            <button class="tab" onclick="showTab('exam')">📝 真题测试</button>
            <button class="tab" onclick="showTab('wrongbook')">❌ 错题集</button>
        </div>

        <!-- 复习计划标签页 -->
        <div id="plan" class="tab-content active">
            <div class="plan-header">
                <div class="progress-info">
                    <span>复习进度: <span id="progressText">0/90天</span></span>
                </div>
                <div>
                    <button class="exam-btn-secondary" onclick="resetPlan()">重置计划</button>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="calendar-view" id="calendarView">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 知识卡片标签页 -->
        <div id="knowledge" class="tab-content">
            <div class="subject-selector">
                <button class="subject-btn active" onclick="showSubject('accounting')">初级会计实务（11章）</button>
                <button class="subject-btn" onclick="showSubject('law')">经济法基础（8章）</button>
            </div>
            <div id="accountingKnowledge" class="chapter-list">
                <!-- 动态生成 -->
            </div>
            <div id="lawKnowledge" class="chapter-list" style="display: none;">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 真题测试标签页 -->
        <div id="exam" class="tab-content">
            <div class="exam-selector">

    <script>
        // 全局变量
        let studyPlan = [];
        let currentExam = null;
        let examTimer = null;
        let examAnswers = {};
        let wrongQuestions = JSON.parse(localStorage.getItem('wrongQuestions') || '[]');

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            generateStudyPlan();
            renderKnowledgeCards();
            loadWrongQuestions();
        });

        // 标签页切换
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        // 生成复习计划（90天，每周5天学习，2天休息）
        function generateStudyPlan() {
            const savedPlan = localStorage.getItem('studyPlan');
            if (savedPlan) {
                studyPlan = JSON.parse(savedPlan);
            } else {
                const startDate = new Date();
                const tasks = [
                    // 第一阶段：基础学习（第1-45天）
                    { phase: '基础', subject: '会计', topic: '第一章 总论', duration: 3 },
                    { phase: '基础', subject: '会计', topic: '第二章 会计基础', duration: 5 },
                    { phase: '基础', subject: '会计', topic: '第三章 资产（一）', duration: 6 },
                    { phase: '基础', subject: '会计', topic: '第三章 资产（二）', duration: 5 },
                    { phase: '基础', subject: '会计', topic: '第四章 负债', duration: 4 },
                    { phase: '基础', subject: '会计', topic: '第五章 所有者权益', duration: 3 },
                    { phase: '基础', subject: '会计', topic: '第六章 收入', duration: 4 },
                    { phase: '基础', subject: '会计', topic: '第七章 费用', duration: 2 },
                    { phase: '基础', subject: '会计', topic: '第八章 利润', duration: 3 },
                    { phase: '基础', subject: '会计', topic: '第九章 财务报告', duration: 4 },
                    { phase: '基础', subject: '法律', topic: '第一章 总论', duration: 2 },
                    { phase: '基础', subject: '法律', topic: '第二章 会计法律制度', duration: 4 },
                    // 第二阶段：深入学习（第46-75天）
                    { phase: '深化', subject: '法律', topic: '第三章 支付结算法律制度', duration: 5 },
                    { phase: '深化', subject: '法律', topic: '第四章 税法概述及货物和劳务税', duration: 6 },
                    { phase: '深化', subject: '法律', topic: '第五章 所得税法律制度', duration: 4 },
                    { phase: '深化', subject: '法律', topic: '第六章 财产和行为税法律制度', duration: 5 },
                    { phase: '深化', subject: '法律', topic: '第七章 税收征管法律制度', duration: 4 },
                    { phase: '深化', subject: '法律', topic: '第八章 劳动合同与社会保险法律制度', duration: 4 },
                    { phase: '深化', subject: '会计', topic: '第十章 产品成本核算', duration: 4 },
                    { phase: '深化', subject: '会计', topic: '第十一章 政府会计基础', duration: 3 },
                    // 第三阶段：综合复习（第76-85天）
                    { phase: '综合', subject: '综合', topic: '会计实务综合复习', duration: 5 },
                    { phase: '综合', subject: '综合', topic: '经济法综合复习', duration: 5 },
                    // 第四阶段：真题演练（第86-90天）
                    { phase: '真题', subject: '真题', topic: '2023年真题练习', duration: 2 },
                    { phase: '真题', subject: '真题', topic: '2024年真题练习', duration: 2 },
                    { phase: '真题', subject: '真题', topic: '2025年真题练习', duration: 2 },
                    { phase: '真题', subject: '真题', topic: '错题集复习', duration: 2 }
                ];

                let dayCount = 0;
                let taskIndex = 0;
                let currentTask = tasks[taskIndex];
                let taskDay = 0;

                for (let i = 0; i < 90; i++) {
                    const currentDate = new Date(startDate);
                    currentDate.setDate(startDate.getDate() + i);
                    const dayOfWeek = currentDate.getDay();

                    // 周六周日休息
                    if (dayOfWeek === 0 || dayOfWeek === 6) {
                        studyPlan.push({
                            day: i + 1,
                            date: currentDate.toISOString().split('T')[0],
                            isRest: true,
                            task: '休息日',
                            completed: false
                        });
                    } else {
                        studyPlan.push({
                            day: i + 1,
                            date: currentDate.toISOString().split('T')[0],
                            isRest: false,
                            phase: currentTask.phase,
                            subject: currentTask.subject,
                            task: currentTask.topic,
                            completed: false
                        });

                        taskDay++;
                        if (taskDay >= currentTask.duration) {
                            taskIndex++;
                            taskDay = 0;
                            if (taskIndex < tasks.length) {
                                currentTask = tasks[taskIndex];
                            }
                        }
                    }
                    dayCount++;
                }

                localStorage.setItem('studyPlan', JSON.stringify(studyPlan));
            }

            renderCalendar();
            updateProgress();
        }

        // 渲染日历
        function renderCalendar() {
            const calendarView = document.getElementById('calendarView');
            calendarView.innerHTML = '';

            const today = new Date().toISOString().split('T')[0];

            studyPlan.forEach((day, index) => {
                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';

                if (day.isRest) {
                    dayCard.classList.add('rest-day');
                } else if (day.completed) {
                    dayCard.classList.add('completed');
                }

                if (day.date === today) {
                    dayCard.classList.add('today');
                }

                const statusClass = day.isRest ? 'rest' : (day.completed ? 'completed' : 'pending');
                const statusText = day.isRest ? '休息' : (day.completed ? '已完成' : '待完成');

                dayCard.innerHTML = `
                    <div class="day-header">
                        <span class="day-title">第${day.day}天</span>
                        <span class="day-status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="day-task">
                        <strong>${day.date}</strong><br>
                        ${day.isRest ? '☕ 休息日，好好放松' : `📚 ${day.task}`}
                    </div>
                    ${!day.isRest ? `
                        <button class="checkin-btn"
                                onclick="checkIn(${index})"
                                ${day.completed ? 'disabled' : ''}>
                            ${day.completed ? '✓ 已打卡' : '📝 完成打卡'}
                        </button>
                    ` : ''}
                `;

                calendarView.appendChild(dayCard);
            });
        }

        // 打卡功能
        function checkIn(index) {
            if (!studyPlan[index].isRest && !studyPlan[index].completed) {
                studyPlan[index].completed = true;
                localStorage.setItem('studyPlan', JSON.stringify(studyPlan));
                renderCalendar();
                updateProgress();
            }
        }

        // 更新进度
        function updateProgress() {
            const completed = studyPlan.filter(day => !day.isRest && day.completed).length;
            const total = studyPlan.filter(day => !day.isRest).length;
            const percentage = Math.round((completed / total) * 100);

            document.getElementById('progressText').textContent = `${completed}/${total}天`;
            document.getElementById('progressFill').style.width = `${percentage}%`;
        }

        // 重置计划
        function resetPlan() {
            if (confirm('确定要重置复习计划吗？所有进度将丢失。')) {
                localStorage.removeItem('studyPlan');
                generateStudyPlan();
            }
        }

        // 显示科目知识
        function showSubject(subject) {
            document.querySelectorAll('.subject-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (subject === 'accounting') {
                document.getElementById('accountingKnowledge').style.display = 'grid';
                document.getElementById('lawKnowledge').style.display = 'none';
            } else {
                document.getElementById('accountingKnowledge').style.display = 'none';
                document.getElementById('lawKnowledge').style.display = 'grid';
            }
        }

        function renderKnowledgeCards() {
            renderAccountingKnowledge();
            renderLawKnowledge();

        function toggleChapter(index) {
            const knowledgeDiv = document.getElementById(`knowledge-${index}`);

        // 考试计时器
        function startTimer() {
            let timeLeft = 105 * 60; // 105分钟
            const timerElement = document.getElementById('examTimer');

            if (examTimer) {
                clearInterval(examTimer);
            }

            examTimer = setInterval(() => {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

                if (timeLeft <= 0) {
                    clearInterval(examTimer);
                    alert('考试时间到！系统将自动提交试卷。');
                    submitExam();
                }

                timeLeft--;
            }, 1000);
        }

        // 选择答案
        function selectAnswer(questionIndex, answer) {
            examAnswers[questionIndex] = answer;

            // 更新UI
            const options = document.querySelectorAll(`input[name="q${questionIndex}"]`);
            options.forEach((option, index) => {
                const labelId = `option-${questionIndex}-${index}`;
                const label = document.getElementById(labelId);
                if (option.checked) {
                    label.classList.add('selected');
                } else {
                    label.classList.remove('selected');
                }
            });
        }

        // 提交考试
        function submitExam() {
            if (examTimer) {
                clearInterval(examTimer);
            }

            const questions = getExamQuestions(currentExam);
            let correctCount = 0;
            let wrongQuestionsList = [];

            questions.forEach((q, index) => {
                const userAnswer = examAnswers[index];
                if (userAnswer === q.answer) {
                    correctCount++;
                } else {
                    wrongQuestionsList.push({
                        ...q,
                        userAnswer: userAnswer || '未作答',
                        year: currentExam,
                        questionNumber: index + 1
                    });
                }
            });

            const score = Math.round((correctCount / questions.length) * 100);
            const passed = score >= 60;

            // 保存错题
            wrongQuestionsList.forEach(wrongQ => {
                const exists = wrongQuestions.some(q =>
                    q.question === wrongQ.question && q.year === wrongQ.year
                );
                if (!exists) {
                    wrongQuestions.push(wrongQ);
                }
            });
            localStorage.setItem('wrongQuestions', JSON.stringify(wrongQuestions));

            // 显示结果
            showExamResult(score, passed, correctCount, questions.length);
            loadWrongQuestions();
        }

        // 渲染章节测试题目
        function renderChapterTestQuestions() {
            const body = document.getElementById('chapterTestBody');
            const questions = currentChapterTest.questions;
            
            body.innerHTML = questions.map((q, index) => `
                <div class="chapter-question-item">
                    <div class="chapter-question-number">第${index + 1}题</div>
                    <div class="chapter-question-text">${q.question}</div>
                    <div class="chapter-question-options">
                        ${q.options.map((option, optIndex) => `
                            <label class="chapter-option-label" id="chapter-option-${index}-${optIndex}">
                                <input type="radio" name="chapter-q${index}" value="${option.value}"
                                       onchange="selectChapterAnswer(${index}, '${option.value}')">
                                ${option.label}. ${option.text}
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            
            updateChapterTestProgress();
        }

        // 选择章节测试答案
        function selectChapterAnswer(questionIndex, answer) {
            chapterTestAnswers[questionIndex] = answer;
            
            // 更新UI
            const options = document.querySelectorAll(`input[name="chapter-q${questionIndex}"]`);
            options.forEach((option, index) => {
                const labelId = `chapter-option-${questionIndex}-${index}`;
                const label = document.getElementById(labelId);
                if (option.checked) {
                    label.classList.add('selected');
                } else {
                    label.classList.remove('selected');
                }
            });
            
            updateChapterTestProgress();
        }

        // 更新章节测试进度
        function updateChapterTestProgress() {
            const answered = Object.keys(chapterTestAnswers).length;
            const total = currentChapterTest.questions.length;
            document.getElementById('chapterTestProgress').textContent = `题目进度: ${answered}/${total}`;
        }

        // 提交章节测试
        function submitChapterTest() {
            const questions = currentChapterTest.questions;
            let correctCount = 0;
            let wrongList = [];
            
            questions.forEach((q, index) => {
                const userAnswer = chapterTestAnswers[index];
                if (userAnswer === q.answer) {
                    correctCount++;
                } else {
                    wrongList.push({
                        ...q,
                        userAnswer: userAnswer || '未作答',
                        questionNumber: index + 1
                    });
                }
            });
            
            // 显示结果
            showChapterTestResult(correctCount, questions.length, wrongList);
        }

        // 显示章节测试结果
        function showChapterTestResult(correctCount, totalCount, wrongList) {
            const body = document.getElementById('chapterTestBody');
            const footer = document.getElementById('chapterTestFooter');
            const score = Math.round((correctCount / totalCount) * 100);
            
            body.innerHTML = `
                <div class="chapter-test-result">
                    <div class="chapter-result-score">${score}分</div>
                    <div class="chapter-result-message" style="color: ${score >= 60 ? '#4caf50' : '#e74c3c'}">
                        ${score >= 60 ? '🎉 恭喜通过！' : '💪 继续努力！'}
                    </div>
                    <div class="chapter-result-stats">
                        <div class="chapter-stat-item">
                            <div class="chapter-stat-label">正确题数</div>
                            <div class="chapter-stat-value" style="color: #4caf50">${correctCount}</div>
                        </div>
                        <div class="chapter-stat-item">
                            <div class="chapter-stat-label">错误题数</div>
                            <div class="chapter-stat-value" style="color: #e74c3c">${totalCount - correctCount}</div>
                        </div>
                        <div class="chapter-stat-item">
                            <div class="chapter-stat-label">总题数</div>
                            <div class="chapter-stat-value">${totalCount}</div>
                        </div>
                        <div class="chapter-stat-item">
                            <div class="chapter-stat-label">正确率</div>
                            <div class="chapter-stat-value">${score}%</div>
                        </div>
                    </div>
                    ${wrongList.length > 0 ? `
                        <div style="margin-top: 30px; text-align: left;">
                            <h3 style="color: #e74c3c; margin-bottom: 15px;">❌ 错题解析</h3>
                            ${wrongList.map(wq => `
                                <div style="background: #fff5f5; padding: 15px; margin-bottom: 15px; border-radius: 10px; border-left: 4px solid #e74c3c;">
                                    <div style="font-weight: bold; color: #e74c3c; margin-bottom: 8px;">第${wq.questionNumber}题</div>
                                    <div style="margin-bottom: 8px;">${wq.question}</div>
                                    <div style="background: #ffebee; padding: 8px; border-radius: 5px; margin-bottom: 5px;">
                                        <strong>你的答案：</strong>${wq.userAnswer}
                                    </div>
                                    <div style="background: #e8f5e9; padding: 8px; border-radius: 5px; margin-bottom: 5px;">
                                        <strong>正确答案：</strong>${wq.answer}
                                    </div>
                                    <div style="background: #fff3cd; padding: 8px; border-radius: 5px;">
                                        <strong>解析：</strong>${wq.explanation}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            `;
            
            footer.innerHTML = `
                <button class="chapter-test-submit" onclick="restartChapterTest()">重新测试</button>
                <button class="exam-btn-secondary" onclick="closeChapterTest()">关闭</button>
            `;
        }

        // 重新开始章节测试
        function restartChapterTest() {
            chapterTestAnswers = {};
            currentChapterTest.questions = generateChapterQuestions(
                currentChapterTest.subject,
                currentChapterTest.chapterIndex,
                { title: currentChapterTest.chapterTitle }
            );
            renderChapterTestQuestions();
            
            document.getElementById('chapterTestFooter').innerHTML = `
                <button class="chapter-test-submit" onclick="submitChapterTest()">提交答案</button>
            `;
        }

        // 关闭章节测试
        function closeChapterTest() {
            document.getElementById('chapterTestModal').classList.remove('active');
            currentChapterTest = null;
            chapterTestAnswers = {};
